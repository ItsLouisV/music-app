name: iOS IPA for Sideloadly

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Force Disable Code Signing
        run: |
          # Gán Team ID giả để lừa Flutter pre-flight check
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = XYZ1234567;/g' ios/Runner.xcodeproj/project.pbxproj
          # Nếu chưa có dòng DEVELOPMENT_TEAM, chèn nó vào sau PRODUCT_BUNDLE_IDENTIFIER
          grep -q "DEVELOPMENT_TEAM" ios/Runner.xcodeproj/project.pbxproj || sed -i '' '/PRODUCT_BUNDLE_IDENTIFIER/a\
          DEVELOPMENT_TEAM = XYZ1234567;' ios/Runner.xcodeproj/project.pbxproj
          
          # Tắt tất cả các yêu cầu về chữ ký
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Build iOS App (No Codesign)
        run: |
          flutter build ios --release --no-codesign

      - name: Create IPA for Sideloadly
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r music_app_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: music_app_sideloadly
          path: music_app_unsigned.ipa
